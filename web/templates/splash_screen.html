<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>EducaNorte — Início</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --azul-escuro:  #0A1628;
    --azul-medio:   #1A3A6B;
    --azul-claro:   #2E6DB4;
    --dourado:      #C9A227;
    --dourado-claro:#E8C547;
    --branco:       #F0EDE6;
    --cinza:        rgba(255,255,255,0.55);
  }

  html, body {
    height: 100%;
    background: #06090F;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Nunito', sans-serif;
    overflow: hidden;
  }

  /* ── Moldura de celular ── */
  .phone {
    width: 340px;
    height: 680px;
    background: var(--azul-escuro);
    border-radius: 44px;
    border: 3px solid #1C2C44;
    box-shadow:
      0 0 0 1px #0a0e18,
      0 30px 80px rgba(0,0,0,.9),
      inset 0 0 0 1px rgba(255,255,255,.04);
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* Notch */
  .phone::before {
    content: '';
    position: absolute;
    top: 0; left: 50%; transform: translateX(-50%);
    width: 100px; height: 26px;
    background: #06090F;
    border-radius: 0 0 18px 18px;
    z-index: 20;
  }

  /* ── Fundo com formas geométricas ── */
  .bg-shapes {
    position: absolute;
    inset: 0;
    overflow: hidden;
    pointer-events: none;
  }
  .shape {
    position: absolute;
    border-radius: 50%;
    filter: blur(40px);
    opacity: 0;
    animation: fadeShape 1.2s ease forwards;
  }
  .shape-1 {
    width: 260px; height: 260px;
    background: radial-gradient(circle, #1A3A6B88, transparent 70%);
    top: -60px; left: -60px;
    animation-delay: .2s;
  }
  .shape-2 {
    width: 200px; height: 200px;
    background: radial-gradient(circle, #C9A22730, transparent 70%);
    bottom: 80px; right: -40px;
    animation-delay: .4s;
  }
  .shape-3 {
    width: 150px; height: 150px;
    background: radial-gradient(circle, #2E6DB422, transparent 70%);
    bottom: 200px; left: -30px;
    animation-delay: .6s;
  }
  @keyframes fadeShape { to { opacity: 1; } }

  /* Linhas decorativas de grid */
  .grid-lines {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(46,109,180,.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(46,109,180,.06) 1px, transparent 1px);
    background-size: 32px 32px;
    pointer-events: none;
  }

  /* ── Status bar ── */
  .status-bar {
    width: 100%;
    padding: 32px 24px 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 11px;
    font-weight: 700;
    color: rgba(255,255,255,.6);
    position: relative;
    z-index: 10;
  }

  /* ── Conteúdo principal ── */
  .content {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 0 28px;
    position: relative;
    z-index: 10;
    gap: 0;
  }

  /* Badge PET */
  .badge {
    background: rgba(201,162,39,.12);
    border: 1px solid rgba(201,162,39,.35);
    color: var(--dourado-claro);
    font-size: 10px;
    font-weight: 800;
    letter-spacing: .12em;
    padding: 5px 14px;
    border-radius: 20px;
    text-transform: uppercase;
    margin-bottom: 24px;
    opacity: 0;
    transform: translateY(12px);
    animation: slideUp .6s .3s ease forwards;
  }

  /* ── Logo ── */
  .logo-wrap {
    width: 130px;
    height: 130px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 22px;
    opacity: 0;
    transform: translateY(16px) scale(.92);
    animation: logoEntrada .8s .5s cubic-bezier(.22,.68,0,1.2) forwards;
    position: relative;
  }
  /* Halo dourado atrás da logo */
  .logo-wrap::before {
    content: '';
    position: absolute;
    width: 140px; height: 140px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(201,162,39,.18) 0%, transparent 70%);
    animation: pulseLogo 3s 1.5s ease-in-out infinite;
  }
  @keyframes pulseLogo {
    0%,100% { transform: scale(1); opacity: .7; }
    50%      { transform: scale(1.15); opacity: 1; }
  }
  @keyframes logoEntrada {
    to { opacity:1; transform: translateY(0) scale(1); }
  }

  /* A logo é a imagem 2 renderizada via SVG/CSS — usamos um SVG inline
     que recria o símbolo livro + cérebro nos mesmos tons dourado/azul */
  .logo-svg {
    width: 120px;
    height: 120px;
    filter: drop-shadow(0 4px 20px rgba(201,162,39,.4));
  }

  /* ── Nome do app ── */
  .app-name {
    font-family: 'Cinzel', serif;
    font-size: 28px;
    font-weight: 900;
    letter-spacing: .06em;
    color: var(--branco);
    text-align: center;
    margin-bottom: 4px;
    opacity: 0;
    transform: translateY(14px);
    animation: slideUp .6s .8s ease forwards;
    line-height: 1.1;
  }
  .app-name span {
    color: var(--dourado-claro);
  }

  .app-sub {
    font-size: 11px;
    font-weight: 600;
    color: var(--azul-claro);
    letter-spacing: .18em;
    text-transform: uppercase;
    text-align: center;
    margin-bottom: 28px;
    opacity: 0;
    animation: slideUp .6s .95s ease forwards;
  }

  /* ── Divisor ── */
  .divider {
    width: 50px;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--dourado), transparent);
    margin-bottom: 22px;
    opacity: 0;
    animation: fadeIn .6s 1.1s ease forwards;
  }

  /* ── Descrição ── */
  .descricao {
    font-size: 13px;
    font-weight: 600;
    color: var(--cinza);
    text-align: center;
    line-height: 1.7;
    margin-bottom: 32px;
    opacity: 0;
    transform: translateY(10px);
    animation: slideUp .6s 1.2s ease forwards;
  }

  /* ── Botão START ── */
  .btn-start {
    width: 100%;
    padding: 16px;
    background: linear-gradient(135deg, var(--dourado) 0%, var(--dourado-claro) 100%);
    color: var(--azul-escuro);
    font-family: 'Cinzel', serif;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: .12em;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    text-decoration: none;
    text-align: center;
    display: block;
    opacity: 0;
    transform: translateY(12px);
    animation: slideUp .7s 1.4s cubic-bezier(.22,.68,0,1.2) forwards;
    box-shadow:
      0 4px 20px rgba(201,162,39,.4),
      0 1px 0 rgba(255,255,255,.3) inset;
    transition: transform .15s, box-shadow .15s;
    position: relative;
    overflow: hidden;
  }
  .btn-start::before {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 60%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,.25), transparent);
    animation: shimmer 2.5s 2s ease infinite;
  }
  @keyframes shimmer { to { left: 160%; } }
  .btn-start:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 28px rgba(201,162,39,.55), 0 1px 0 rgba(255,255,255,.3) inset;
  }
  .btn-start:active { transform: scale(.97); }

  /* ── Indicadores de página ── */
  .dots {
    display: flex;
    gap: 7px;
    margin-top: 28px;
    margin-bottom: 20px;
    opacity: 0;
    animation: fadeIn .6s 1.7s ease forwards;
  }
  .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: rgba(255,255,255,.2);
  }
  .dot.ativo {
    width: 22px;
    border-radius: 4px;
    background: var(--dourado);
  }

  /* Animações base */
  @keyframes slideUp { to { opacity:1; transform:translateY(0); } }
  @keyframes fadeIn  { to { opacity:1; } }
</style>
</head>
<body>

<div class="phone">

  <!-- Fundo -->
  <div class="bg-shapes">
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>
    <div class="shape shape-3"></div>
  </div>
  <div class="grid-lines"></div>

  <!-- Barra de status -->
  <div class="status-bar">
    <span>10:30</span>
    <span>▲▲▲ WiFi 100%</span>
  </div>

  <!-- Conteúdo -->
  <div class="content">

    <div class="badge">PET-IEG · UFOPA</div>

    <!-- Logo recriada em SVG com os mesmos elementos da imagem 2 -->
    <div class="logo-wrap">
      <svg class="logo-svg" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="gAzul" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#1A5BA6"/>
            <stop offset="100%" stop-color="#0D3A7A"/>
          </linearGradient>
          <linearGradient id="gDourado" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#E8C547"/>
            <stop offset="100%" stop-color="#B8901A"/>
          </linearGradient>
          <linearGradient id="gDouradoClaro" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#F0D060"/>
            <stop offset="100%" stop-color="#C9A227"/>
          </linearGradient>
        </defs>

        <!-- Livro azul de fundo (camada traseira) -->
        <path d="M10 82 Q10 88 16 88 L55 88 L55 30 Q38 26 10 32 Z" fill="url(#gAzul)" opacity=".85"/>
        <path d="M110 82 Q110 88 104 88 L65 88 L65 30 Q82 26 110 32 Z" fill="url(#gAzul)" opacity=".85"/>
        <!-- Lombada inferior livro azul -->
        <path d="M55 88 Q60 92 65 88" stroke="#1A5BA6" stroke-width="2" fill="none"/>

        <!-- Livro dourado principal (frente) -->
        <path d="M18 76 Q18 82 24 82 L55 82 L55 26 Q40 21 18 28 Z" fill="url(#gDourado)"/>
        <path d="M102 76 Q102 82 96 82 L65 82 L65 26 Q80 21 102 28 Z" fill="url(#gDourado)"/>

        <!-- Abertura do livro no topo -->
        <path d="M55 26 Q60 20 65 26" stroke="url(#gDouradoClaro)" stroke-width="2.5"
              stroke-linecap="round" fill="none"/>

        <!-- Lombada inferior livro dourado -->
        <path d="M55 82 Q60 87 65 82" stroke="#C9A227" stroke-width="2.5"
              stroke-linecap="round" fill="none"/>

        <!-- Retângulo escuro central (interior livro) -->
        <rect x="28" y="32" width="64" height="46" rx="3" fill="#0A1628" opacity=".95"/>

        <!-- Cérebro dourado com circuitos -->
        <!-- Metade esquerda -->
        <path d="M42 47 C38 44 34 46 34 51 C34 56 38 58 42 57
                  C40 60 42 63 45 63 C46 63 47 62 47 61 L47 47 Z"
              fill="url(#gDouradoClaro)"/>
        <!-- Metade direita -->
        <path d="M78 47 C82 44 86 46 86 51 C86 56 82 58 78 57
                  C80 60 78 63 75 63 C74 63 73 62 73 61 L73 47 Z"
              fill="url(#gDouradoClaro)"/>
        <!-- Centro cérebro -->
        <path d="M47 45 C47 42 53 40 60 40 C67 40 73 42 73 45
                  L73 63 C73 65 67 67 60 67 C53 67 47 65 47 63 Z"
              fill="url(#gDouradoClaro)"/>
        <!-- Divisão central -->
        <line x1="60" y1="41" x2="60" y2="66" stroke="#0A1628" stroke-width="1.5"/>
        <!-- Sulcos do cérebro esquerdo -->
        <path d="M50 48 Q53 45 56 48 Q53 51 50 52" stroke="#0A1628" stroke-width="1" fill="none" opacity=".6"/>
        <path d="M50 55 Q53 52 56 55" stroke="#0A1628" stroke-width="1" fill="none" opacity=".6"/>
        <!-- Sulcos direito -->
        <path d="M70 48 Q67 45 64 48 Q67 51 70 52" stroke="#0A1628" stroke-width="1" fill="none" opacity=".6"/>
        <path d="M70 55 Q67 52 64 55" stroke="#0A1628" stroke-width="1" fill="none" opacity=".6"/>

        <!-- Circuitos -->
        <circle cx="36" cy="51" r="2" fill="#0A1628" stroke="url(#gDouradoClaro)" stroke-width="1"/>
        <circle cx="84" cy="51" r="2" fill="#0A1628" stroke="url(#gDouradoClaro)" stroke-width="1"/>
        <line x1="36" y1="51" x2="42" y2="51" stroke="url(#gDouradoClaro)" stroke-width="1" opacity=".7"/>
        <line x1="84" y1="51" x2="78" y2="51" stroke="url(#gDouradoClaro)" stroke-width="1" opacity=".7"/>
        <circle cx="45" cy="66" r="1.5" fill="#0A1628" stroke="url(#gDouradoClaro)" stroke-width="1"/>
        <circle cx="75" cy="66" r="1.5" fill="#0A1628" stroke="url(#gDouradoClaro)" stroke-width="1"/>
        <line x1="45" y1="64" x2="45" y2="66" stroke="url(#gDouradoClaro)" stroke-width="1" opacity=".7"/>
        <line x1="75" y1="64" x2="75" y2="66" stroke="url(#gDouradoClaro)" stroke-width="1" opacity=".7"/>
      </svg>
    </div>

    <h1 class="app-name">EDUCA<span>NORTE</span></h1>
    <p class="app-sub">Aprender é navegar em novos rios</p>

    <div class="divider"></div>

    <p class="descricao">
      Educação de qualidade para comunidades ribeirinhas amazônicas. Aprenda no seu ritmo, em qualquer lugar, sem internet.
    </p>

    <a href="/selecionar" class="btn-start">COMEÇAR AGORA</a>

    <div class="dots">
      <div class="dot ativo"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>

  </div>
</div>

</body>
</html>
