<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>EducaNorte — Infantil</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  min-height: 100%; background: #0A1628;
  font-family: 'Nunito', sans-serif; color: #F0EDE6;
  display: flex; flex-direction: column;
}
body::before {
  content: ''; position: fixed; inset: 0;
  background: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(255,209,102,.08) 0%, transparent 65%);
  pointer-events: none;
}

/* Topbar */
.topbar {
  padding: 48px 28px 0; display: flex; align-items: center; gap: 12px;
  position: relative; z-index: 1;
}
.back-link {
  color: rgba(255,255,255,.35); font-size: 22px; text-decoration: none;
  transition: color .15s;
}
.back-link:hover { color: #FFD166; }

/* Container */
.container {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 32px 32px 60px;
  position: relative; z-index: 1;
  max-width: 420px; margin: 0 auto; width: 100%;
}

.emoji-grande {
  font-size: 72px; line-height: 1;
  margin-bottom: 20px;
  filter: drop-shadow(0 4px 16px rgba(255,209,102,.4));
  animation: flutua 3s ease-in-out infinite;
}
@keyframes flutua {
  0%,100% { transform: translateY(0); }
  50%      { transform: translateY(-8px); }
}

.titulo {
  font-size: 26px; font-weight: 900;
  color: #FFD166; text-align: center; margin-bottom: 6px;
}
.subtitulo {
  font-size: 15px; font-weight: 600; color: rgba(255,255,255,.45);
  text-align: center; margin-bottom: 36px; line-height: 1.5;
}

.lbl { font-size: 13px; font-weight: 800; color: #FFD166; letter-spacing: .08em; margin-bottom: 8px; display: block; }
.inp {
  width: 100%; padding: 16px 18px;
  background: rgba(255,255,255,.06);
  border: 2px solid rgba(255,209,102,.2);
  border-radius: 14px; color: #F0EDE6;
  font-size: 18px; font-family: 'Nunito', sans-serif; font-weight: 700;
  outline: none; text-align: center;
  transition: border-color .2s, background .2s;
  margin-bottom: 24px;
}
.inp:focus { border-color: #FFD166; background: rgba(255,209,102,.08); }
.inp::placeholder { color: rgba(255,255,255,.2); font-weight: 600; }

.erro {
  background: rgba(231,111,81,.12); border: 1px solid rgba(231,111,81,.3);
  border-radius: 10px; padding: 11px 14px; font-size: 14px;
  color: #E76F51; font-weight: 700; margin-bottom: 20px; text-align: center;
}

.btn {
  width: 100%; padding: 18px;
  background: linear-gradient(135deg, #B07D10, #FFD166);
  color: #0A1628; font-family: 'Nunito', sans-serif;
  font-size: 18px; font-weight: 900; border: none;
  border-radius: 50px; cursor: pointer;
  box-shadow: 0 4px 24px rgba(255,209,102,.4);
  transition: transform .15s, box-shadow .15s;
}
.btn:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(255,209,102,.55); }
.btn:active { transform: scale(.97); }
</style>
</head>
<body>

<div class="topbar">
  <a href="/escolher-modulo" class="back-link">←</a>
</div>

<div class="container">
  <div class="emoji-grande">🌱</div>
  <h1 class="titulo">Módulo Infantil</h1>
  <p class="subtitulo">Como você se chama?<br>Digite seu nome para começar!</p>

  {% if erro %}
  <div class="erro">⚠️ {{ erro }}</div>
  {% endif %}

  <form method="POST" action="/infantil-direto" style="width:100%;">
    <label class="lbl">MEU NOME É:</label>
    <input class="inp" type="text" name="nome"
           placeholder="Digite seu nome..." autocomplete="off"
           autofocus maxlength="30">
    <button class="btn" type="submit">Vamos aprender! 🚀</button>
  </form>
</div>

</body>
</html>
