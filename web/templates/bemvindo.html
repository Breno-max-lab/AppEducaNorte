<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>EducaNorte</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Nunito:wght@700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%; width: 100%;
  background: #060d1a;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Nunito', sans-serif;
  overflow: hidden;
}

/* ── Canvas de partículas (JS) ── */
#canvas-bg {
  position: fixed; inset: 0; z-index: 0;
  pointer-events: none;
}

/* ── Ondas animadas de fundo ── */
.ondas {
  position: fixed; bottom: 0; left: 0; right: 0;
  height: 180px; z-index: 0; pointer-events: none; overflow: hidden;
}
.onda {
  position: absolute; bottom: 0; left: -50%; width: 200%;
  height: 100%; border-radius: 40%;
  animation: ondular linear infinite;
}
.onda-1 { background: rgba(26,58,107,.18); animation-duration: 7s; }
.onda-2 { background: rgba(46,109,180,.1); animation-duration: 9s; animation-delay: -3s; bottom: -10px; }
.onda-3 { background: rgba(14,42,80,.25);  animation-duration: 11s; animation-delay: -6s; bottom: -20px; }
@keyframes ondular {
  0%   { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

/* ── Gradiente central ── */
.fundo-gradiente {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background:
    radial-gradient(ellipse 65% 60% at 50% 30%, rgba(26,58,107,.6) 0%, transparent 70%),
    radial-gradient(ellipse 40% 30% at 80% 80%, rgba(201,162,39,.08) 0%, transparent 60%);
}

/* ── Grade de pontos ── */
.grid {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background-image: radial-gradient(rgba(46,109,180,.15) 1px, transparent 1px);
  background-size: 28px 28px;
  mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 0%, transparent 75%);
  -webkit-mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 0%, transparent 75%);
}

/* ── Container central ── */
.splash {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 32px 40px;
  position: relative; z-index: 1;
  width: 100%; max-width: 400px;
}

/* ── LOGO com animações ── */
.logo-exterior {
  position: relative;
  width: 180px; height: 180px;
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 36px;
}

/* Anel rotativo externo */
.anel-externo {
  position: absolute;
  width: 175px; height: 175px;
  border-radius: 50%;
  border: 1.5px solid transparent;
  border-top-color: rgba(201,162,39,.5);
  border-right-color: rgba(201,162,39,.2);
  animation: girar 6s linear infinite;
  opacity: 0; animation-fill-mode: forwards;
  animation-delay: .8s;
}
@keyframes girar { to { transform: rotate(360deg); opacity: 1; } }

/* Anel interno pulsante */
.anel-interno {
  position: absolute;
  width: 148px; height: 148px;
  border-radius: 50%;
  border: 1px solid rgba(46,109,180,.2);
  animation: pulso-anel 3s 1.5s ease-in-out infinite;
  opacity: 0;
}
@keyframes pulso-anel {
  0%   { transform: scale(1);    opacity: .5; }
  50%  { transform: scale(1.08); opacity: 1;  }
  100% { transform: scale(1),    opacity: .5; }
}

/* Halo dourado */
.halo {
  position: absolute;
  width: 155px; height: 155px; border-radius: 50%;
  background: radial-gradient(circle, rgba(201,162,39,.22) 0%, transparent 65%);
  animation: pulso-halo 3s 1.5s ease-in-out infinite;
  opacity: 0;
}
@keyframes pulso-halo {
  0%,100% { transform: scale(1);    opacity: .7; }
  50%      { transform: scale(1.18); opacity: 1;  }
}

/* Logo SVG — flutua */
.logo-wrap {
  position: relative; z-index: 2;
  width: 136px; height: 136px;
  opacity: 0; transform: scale(.8) translateY(20px);
  animation: logo-entrada 1s .3s cubic-bezier(.22,.68,0,1.2) forwards;
  filter: drop-shadow(0 8px 32px rgba(201,162,39,.6));
}
@keyframes logo-entrada {
  to { opacity: 1; transform: scale(1) translateY(0); }
}
/* Flutuação contínua após entrada */
.logo-wrap.flutuando {
  animation: logo-entrada 1s .3s cubic-bezier(.22,.68,0,1.2) forwards,
             flutuar 4s 1.5s ease-in-out infinite;
}
@keyframes flutuar {
  0%,100% { transform: translateY(0);   filter: drop-shadow(0 8px 32px rgba(201,162,39,.6)); }
  50%      { transform: translateY(-10px); filter: drop-shadow(0 16px 40px rgba(201,162,39,.8)); }
}

/* ── Nome do app ── */
.app-nome {
  font-family: 'Cinzel', serif;
  font-size: 38px; font-weight: 900;
  letter-spacing: .07em; text-align: center; line-height: 1;
  color: #F0EDE6; margin-bottom: 8px;
  opacity: 0; transform: translateY(16px);
  animation: fadeUp .7s .9s ease forwards;
}
.app-nome span {
  color: #E8C547;
  text-shadow: 0 0 20px rgba(232,197,71,.4);
}

.app-slogan {
  font-size: 11px; font-weight: 700; letter-spacing: .2em;
  text-transform: uppercase; color: #2E6DB4; text-align: center;
  margin-bottom: 52px;
  opacity: 0;
  animation: fadeUp .6s 1.1s ease forwards;
}

/* ── Botão ── */
.btn-comecar {
  width: 100%; max-width: 280px;
  padding: 18px 0;
  background: linear-gradient(135deg, #B8901A 0%, #E8C547 50%, #C9A227 100%);
  background-size: 200% auto;
  color: #060d1a; font-family: 'Cinzel', serif;
  font-size: 14px; font-weight: 700; letter-spacing: .14em;
  border: none; border-radius: 50px;
  text-decoration: none; text-align: center; display: block;
  box-shadow: 0 4px 30px rgba(201,162,39,.5), 0 1px 0 rgba(255,255,255,.3) inset;
  transition: transform .15s, box-shadow .15s, background-position .4s;
  position: relative; overflow: hidden;
  opacity: 0; transform: translateY(14px);
  animation: fadeUp .7s 1.3s cubic-bezier(.22,.68,0,1.2) forwards;
}
.btn-comecar:hover {
  transform: translateY(-3px);
  box-shadow: 0 10px 40px rgba(201,162,39,.7);
  background-position: right center;
}
.btn-comecar:active { transform: scale(.97); }
/* Brilho deslizante */
.btn-comecar::after {
  content: '';
  position: absolute; top: 0; left: -100%; width: 55%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,.4), transparent);
  animation: shimmer 3s 2s ease infinite;
}
@keyframes shimmer { to { left: 160%; } }

/* ── Rodapé ── */
.footer {
  position: fixed; bottom: 20px;
  font-size: 10px; font-weight: 700; letter-spacing: .1em;
  color: rgba(255,255,255,.15); text-align: center;
  opacity: 0; animation: fadeIn .6s 1.8s ease forwards;
}

@keyframes fadeUp  { to { opacity:1; transform:translateY(0) scale(1); } }
@keyframes fadeIn  { to { opacity:1; } }
</style>
</head>
<body>

<canvas id="canvas-bg"></canvas>
<div class="fundo-gradiente"></div>
<div class="grid"></div>
<div class="ondas">
  <div class="onda onda-1"></div>
  <div class="onda onda-2"></div>
  <div class="onda onda-3"></div>
</div>

<div class="splash">

  <div class="logo-exterior">
    <div class="anel-externo"></div>
    <div class="anel-interno"></div>
    <div class="halo"></div>

    <!-- Logo SVG -->
    <div class="logo-wrap" id="logo">
      <svg width="136" height="136" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="gAz" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#2469BB"/>
            <stop offset="100%" stop-color="#0D3A7A"/>
          </linearGradient>
          <linearGradient id="gDo" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#E8C547"/>
            <stop offset="100%" stop-color="#B8901A"/>
          </linearGradient>
          <linearGradient id="gDoC" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#F5D860"/>
            <stop offset="100%" stop-color="#C9A227"/>
          </linearGradient>
        </defs>
        <path d="M8 80 Q8 87 15 87 L54 87 L54 28 Q36 24 8 30 Z" fill="url(#gAz)" opacity=".85"/>
        <path d="M112 80 Q112 87 105 87 L66 87 L66 28 Q84 24 112 30 Z" fill="url(#gAz)" opacity=".85"/>
        <path d="M54 87 Q60 93 66 87" stroke="#1A5BA6" stroke-width="2" fill="none"/>
        <path d="M16 75 Q16 82 23 82 L54 82 L54 24 Q38 19 16 26 Z" fill="url(#gDo)"/>
        <path d="M104 75 Q104 82 97 82 L66 82 L66 24 Q82 19 104 26 Z" fill="url(#gDo)"/>
        <path d="M54 24 Q60 17 66 24" stroke="url(#gDoC)" stroke-width="3" stroke-linecap="round" fill="none"/>
        <path d="M54 82 Q60 88 66 82" stroke="#C9A227" stroke-width="2.5" stroke-linecap="round" fill="none"/>
        <rect x="26" y="30" width="68" height="48" rx="3" fill="#07101E" opacity=".97"/>
        <path d="M45 43 C40 40 35 43 35 49 C35 55 40 57 44 56 C42 59 44 63 47 63 L47 43Z" fill="url(#gDoC)"/>
        <path d="M75 43 C80 40 85 43 85 49 C85 55 80 57 76 56 C78 59 76 63 73 63 L73 43Z" fill="url(#gDoC)"/>
        <path d="M47 41 C47 38 53 36 60 36 C67 36 73 38 73 41 L73 63 C73 66 67 68 60 68 C53 68 47 66 47 63Z" fill="url(#gDoC)"/>
        <line x1="60" y1="37" x2="60" y2="67" stroke="#07101E" stroke-width="1.8"/>
        <path d="M50 46 Q53 43 56 46 Q53 49 50 50" stroke="#07101E" stroke-width="1.2" fill="none" opacity=".5"/>
        <path d="M50 54 Q53 51 56 54" stroke="#07101E" stroke-width="1.2" fill="none" opacity=".5"/>
        <path d="M70 46 Q67 43 64 46 Q67 49 70 50" stroke="#07101E" stroke-width="1.2" fill="none" opacity=".5"/>
        <path d="M70 54 Q67 51 64 54" stroke="#07101E" stroke-width="1.2" fill="none" opacity=".5"/>
        <circle cx="35" cy="49" r="2.2" fill="#07101E" stroke="url(#gDoC)" stroke-width="1.2"/>
        <circle cx="85" cy="49" r="2.2" fill="#07101E" stroke="url(#gDoC)" stroke-width="1.2"/>
        <line x1="37" y1="49" x2="43" y2="49" stroke="url(#gDoC)" stroke-width="1.2" opacity=".8"/>
        <line x1="83" y1="49" x2="77" y2="49" stroke="url(#gDoC)" stroke-width="1.2" opacity=".8"/>
        <circle cx="47" cy="66" r="2" fill="#07101E" stroke="url(#gDoC)" stroke-width="1.2"/>
        <circle cx="73" cy="66" r="2" fill="#07101E" stroke="url(#gDoC)" stroke-width="1.2"/>
        <line x1="47" y1="64" x2="47" y2="67" stroke="url(#gDoC)" stroke-width="1.2" opacity=".8"/>
        <line x1="73" y1="64" x2="73" y2="67" stroke="url(#gDoC)" stroke-width="1.2" opacity=".8"/>
      </svg>
    </div>
  </div>

  <h1 class="app-nome">EDUCA<span>NORTE</span></h1>
  <p class="app-slogan">Aprender é navegar em novos rios</p>

  <a href="/escolher-modulo" class="btn-comecar">COMEÇAR AGORA</a>

</div>

<p class="footer">PET-IEG · UFOPA 2026</p>

<script>
// ── Partículas flutuantes tipo poeira de rio ──
const canvas = document.getElementById('canvas-bg');
const ctx    = canvas.getContext('2d');
let W = canvas.width  = window.innerWidth;
let H = canvas.height = window.innerHeight;

const NUM = 55;
const particulas = Array.from({length: NUM}, () => ({
  x: Math.random() * W,
  y: Math.random() * H,
  r: Math.random() * 1.8 + .4,
  vx: (Math.random() - .5) * .25,
  vy: (Math.random() - .5) * .18,
  alpha: Math.random() * .4 + .05,
  pulso: Math.random() * Math.PI * 2,
  cor: Math.random() > .6 ? [201,162,39] : [46,109,180],
}));

function tick() {
  ctx.clearRect(0, 0, W, H);
  const t = Date.now() / 1000;
  particulas.forEach(p => {
    p.x += p.vx; p.y += p.vy;
    if (p.x < 0) p.x = W;
    if (p.x > W) p.x = 0;
    if (p.y < 0) p.y = H;
    if (p.y > H) p.y = 0;
    const a = p.alpha * (.5 + .5 * Math.sin(t * .8 + p.pulso));
    const [r, g, b] = p.cor;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(${r},${g},${b},${a})`;
    ctx.fill();
  });
  requestAnimationFrame(tick);
}
tick();

window.addEventListener('resize', () => {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
});

// Ativa flutuação da logo após animação de entrada
setTimeout(() => {
  document.getElementById('logo').classList.add('flutuando');
}, 1400);

// Ativa anéis após entrada
setTimeout(() => {
  document.querySelector('.anel-interno').style.opacity = '1';
  document.querySelector('.halo').style.opacity = '1';
}, 1300);
</script>
</body>
</html>
